name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend (build + testes)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven
          cache-dependency-path: backend/pom.xml

      - name: Dar permissão de execução ao mvnw
        working-directory: backend
        run: chmod +x mvnw

      - name: Rodar testes do backend
        working-directory: backend
        env:
          # Postgres efêmero do próprio job de CI — sem relação com nenhum
          # ambiente real. JWT_SECRET aqui é só para a suíte de testes rodar;
          # não é usado em nenhum ambiente com dados de verdade.
          SPRING_DATASOURCE_PASSWORD: postgres
          JWT_SECRET: k41lesVmKJ8DLcRy9dELfe82EnCw166eUDs96k+FBeFn5CsYB94RrPrT5kAPaDLBzVE1z2mgvcGzIOREuvChGA==
        run: ./mvnw -B test

  frontend:
    name: Frontend (lint + build + audit)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend/artisanvault-frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/artisanvault-frontend/package-lock.json

      - name: Instalar dependências
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Auditar dependências
        run: npm audit --audit-level=moderate
