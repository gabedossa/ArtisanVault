spring.config.import=optional:application-local.properties

spring.datasource.url=jdbc:postgresql://localhost:5432/postgres
spring.datasource.username=${DB_USERNAME:postgres}
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.hibernate.ddl-auto=${DDL_AUTO:update}
spring.jpa.show-sql=${SHOW_SQL:true}

jwt.expiration-ms=86400000

app.cookie.secure=${COOKIE_SECURE:false}

spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB

# spring.datasource.password e jwt.secret ficam em application-local.properties (gitignored).
# Veja application-local.properties.example para o template.
# Em producao, defina as variaveis de ambiente DB_USERNAME (usuario com privilegios minimos),
# DDL_AUTO=validate, SHOW_SQL=false e COOKIE_SECURE=true (exige HTTPS).