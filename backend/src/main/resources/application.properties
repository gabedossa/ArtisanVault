spring.config.import=optional:application-local.properties

spring.datasource.url=jdbc:postgresql://localhost:5432/postgres
spring.datasource.username=${DB_USERNAME:postgres}
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.hibernate.ddl-auto=${DDL_AUTO:validate}
spring.jpa.show-sql=${SHOW_SQL:true}

# O schema agora e versionado pelo Flyway (db/migration). baseline-on-migrate
# permite que um banco ja existente (como o de desenvolvimento) seja tratado
# como se ja estivesse na versao 1, sem tentar reexecutar o baseline nele.
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=1

# Migracoes rodam com um usuario separado (com privilegio de DDL), enquanto a
# aplicacao em si roda com spring.datasource.username/password, que pode ser
# um usuario com privilegio minimo (so DML nas tabelas da aplicacao). Sem
# FLYWAY_USERNAME/FLYWAY_PASSWORD definidos, o Flyway usa o mesmo usuario do
# datasource principal (comportamento atual em dev, sem mudanca).
spring.flyway.user=${FLYWAY_USERNAME:${spring.datasource.username}}
spring.flyway.password=${FLYWAY_PASSWORD:${spring.datasource.password}}

jwt.expiration-ms=86400000

app.cookie.secure=${COOKIE_SECURE:false}
app.trust-proxy-headers=${TRUST_PROXY_HEADERS:false}

spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB

# spring.datasource.password e jwt.secret ficam em application-local.properties (gitignored).
# Veja application-local.properties.example para o template.
# Em producao, defina as variaveis de ambiente DB_USERNAME (usuario com privilegios minimos),
# SHOW_SQL=false e COOKIE_SECURE=true (exige HTTPS). DDL_AUTO=validate ja e o
# default em todos os ambientes agora que o Flyway versiona o schema; mudancas
# de schema devem ser feitas criando uma nova migracao em db/migration, nao
# alterando DDL_AUTO.