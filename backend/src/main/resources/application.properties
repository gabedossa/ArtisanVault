spring.config.import=optional:application-local.properties

# Plataformas como Railway atribuem a porta dinamicamente via env var PORT.
server.port=${PORT:8080}

spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:postgres}
spring.datasource.username=${DB_USERNAME:postgres}
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.hibernate.ddl-auto=${DDL_AUTO:validate}
spring.jpa.show-sql=${SHOW_SQL:true}

# O schema agora e versionado pelo Flyway (db/migration). baseline-on-migrate
# permite que um banco ja existente (como o de desenvolvimento) seja tratado
# como se ja estivesse na versao 1, sem tentar reexecutar o baseline nele.
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=1

# Migracoes rodam com um usuario separado (com privilegio de DDL), enquanto a
# aplicacao em si roda com spring.datasource.username/password, que pode ser
# um usuario com privilegio minimo (so DML nas tabelas da aplicacao). Sem
# FLYWAY_USERNAME/FLYWAY_PASSWORD definidos, o Flyway usa o mesmo usuario do
# datasource principal (comportamento atual em dev, sem mudanca).
spring.flyway.user=${FLYWAY_USERNAME:${spring.datasource.username}}
spring.flyway.password=${FLYWAY_PASSWORD:${spring.datasource.password}}

jwt.expiration-ms=86400000

app.cookie.secure=${COOKIE_SECURE:false}
app.trust-proxy-headers=${TRUST_PROXY_HEADERS:false}

# "Lax" (default) funciona quando frontend e backend sao same-site (dev local).
# Use "None" quando frontend e backend ficam em dominios diferentes de verdade
# (ex.: frontend na Vercel, backend no Railway) - exige COOKIE_SECURE=true junto,
# senao o navegador rejeita o cookie.
app.cookie.same-site=${COOKIE_SAME_SITE:Lax}

# Lista de origens permitidas por CORS, separadas por virgula (sem espaco extra
# necessario). Ex.: https://meuapp.vercel.app,https://www.meudominio.com.br
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000}

# "memory" (default) mantem o contador de rate limit do login na propria instancia
# do backend. "redis" compartilha o contador entre multiplas instancias atras de um
# load balancer (requer um Redis alcancavel via spring.data.redis.host/port abaixo).
app.rate-limit.store=${RATE_LIMIT_STORE:memory}
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.password=${REDIS_PASSWORD:}

# O JWT continua criptograficamente valido ate expirar mesmo depois de logout
# (e stateless); isso bloqueia o jti do token ate la para impedir reuso via
# Authorization header apos o logout. Mesma escolha de "memory" (padrao, por
# instancia) vs. "redis" (compartilhado - usa o mesmo spring.data.redis.* acima)
# do rate limit de login, e pela mesma razao (multiplas instancias atras de LB).
app.token-blocklist.store=${TOKEN_BLOCKLIST_STORE:memory}

spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB

# spring.datasource.password e jwt.secret ficam em application-local.properties (gitignored).
# Veja application-local.properties.example para o template.
# Em producao, defina as variaveis de ambiente DB_USERNAME (usuario com privilegios minimos),
# SHOW_SQL=false e COOKIE_SECURE=true (exige HTTPS). DDL_AUTO=validate ja e o
# default em todos os ambientes agora que o Flyway versiona o schema; mudancas
# de schema devem ser feitas criando uma nova migracao em db/migration, nao
# alterando DDL_AUTO.